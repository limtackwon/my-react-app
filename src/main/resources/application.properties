spring.application.name=my-react-app

# ── Database ─────────────────────────────────────────────────
# 로컬: dotenv-java가 .env를 읽어 SPRING_DATASOURCE_* 를 시스템 프로퍼티로 설정
# Render: render.yaml의 DB_* 환경변수 사용 → 아래 fallback으로 JDBC URL 조합
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tetrisdb}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema init (runs schema.sql on every startup — IF NOT EXISTS guards are safe)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.encoding=UTF-8

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.myreactapp.dto
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-fetch-size=100
mybatis.configuration.default-statement-timeout=30
